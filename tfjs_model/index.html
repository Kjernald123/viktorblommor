<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blomidentifierare - Viktor K</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #status-box { padding: 10px; margin: 10px; border-radius: 5px; width: 300px; text-align: center; }
        .loading { background-color: #fff3cd; color: #856404; }
        .ready { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        #image-preview { max-width: 300px; margin-top: 20px; display: none; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
        .author { margin-top: 50px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>Blomart-identifierare</h1>
    
    <div id="status-box" class="loading">Laddar modell...</div>

    <input type="file" id="image-upload" accept="image/*" disabled>
    <img id="image-preview" alt="Förhandsvisning">
    
    <div id="result"></div>

    <p class="author">Skapad av: Viktor K SA23A</p>

    <script>
        let model;
        const statusBox = document.getElementById('status-box');
        const imageUpload = document.getElementById('image-upload');
        const imagePreview = document.getElementById('image-preview');
        const resultDiv = document.getElementById('result');

        // Ersätt dessa med de faktiska klassnamnen som din modell tränats på
        const FLOWER_CLASSES = ['Solros', 'Maskros', 'Ros', 'Tulpan', 'Prästkrage'];

        async function loadModel() {
            try {
                // Modellen laddas från samma mapp på GitHub (tfjs_model/)
                model = await tf.loadLayersModel('model.json');
                statusBox.textContent = 'Modellen är laddad!';
                statusBox.className = 'ready';
                imageUpload.disabled = false;
            } catch (error) {
                statusBox.textContent = 'Fel vid laddning av modell: ' + error.message;
                statusBox.className = 'error';
                console.error(error);
            }
        }

        imageUpload.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                imagePreview.onload = () => predict();
            };
            reader.readAsDataURL(file);
        });

        async function predict() {
            if (!model) return;

            resultDiv.textContent = 'Analyserar...';

            // Bilden göras om till en tensor och anpassas till 224x224
            const tensor = tf.browser.fromPixels(imagePreview)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .expandDims();

            // Normalisering (ofta 0-1 eller -1 till 1 beroende på hur modellen tränades)
            const normalized = tensor.div(255.0);

            const predictions = await model.predict(normalized).data();
            const maxPrediction = Math.max(...predictions);
            const index = predictions.indexOf(maxPrediction);
            
            const flowerName = FLOWER_CLASSES[index] || "Okänd art";
            const probability = (maxPrediction * 100).toFixed(2);

            resultDiv.textContent = `Art: ${flowerName} (${probability}%)`;
        }

        loadModel();
    </script>
</body>
</html>
